all:
  vars:
    ansible_user: deploy
    ansible_become: true
    ansible_become_method: sudo
    # Use --ask-become-pass at runtime, or set in vault:
    #   ansible_become_pass: "{{ vault_become_pass }}"
    ansible_python_interpreter: /usr/bin/python3
    ansible_connection: local   # running Ansible directly on the server

  hosts:
    eurion-vm:
      ansible_host: localhost
      # Override per-host: ansible_host: 10.0.0.5
