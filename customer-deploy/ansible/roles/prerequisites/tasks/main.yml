---
# Prerequisites role — Installs system packages, Docker, and configures the OS
# Supports: Ubuntu 22.04/24.04, Debian 12, RHEL 9, Rocky 9, AlmaLinux 9

- name: Validate supported OS
  ansible.builtin.assert:
    that:
      - ansible_os_family in ['Debian', 'RedHat']
      - ansible_distribution_major_version | int >= 12 or ansible_distribution == 'Ubuntu'
    fail_msg: "Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}. Supported: Ubuntu 22+, Debian 12+, RHEL/Rocky/Alma 9+"

- name: Print system info
  ansible.builtin.debug:
    msg: "OS: {{ ansible_distribution }} {{ ansible_distribution_version }} | CPU: {{ ansible_processor_vcpus }} | RAM: {{ ansible_memtotal_mb }}MB | Disk: {{ ansible_mounts | selectattr('mount', 'equalto', '/') | map(attribute='size_total') | first | default(0) | int // 1073741824 }}GB"

# ── System Requirements Check ────────────────────────────────────────────────
- name: Check minimum RAM (8GB)
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= 7500
    fail_msg: "Minimum 8GB RAM required. Found: {{ ansible_memtotal_mb }}MB"
  when: deploy_mode != 'kubernetes'

- name: Check minimum CPU cores (4)
  ansible.builtin.assert:
    that:
      - ansible_processor_vcpus >= 4
    fail_msg: "Minimum 4 CPU cores required. Found: {{ ansible_processor_vcpus }}"
  when: deploy_mode != 'kubernetes'

# ── System Packages (Debian/Ubuntu) ──────────────────────────────────────────
- name: Install base packages (Debian/Ubuntu)
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
      - python3-pip
      - python3-setuptools
      - python3-docker
      - jq
      - htop
      - iotop
      - unzip
      - ufw
      - fail2ban
      - logrotate
      - cron
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'

# ── System Packages (RHEL/Rocky/Alma) ────────────────────────────────────────
- name: Install base packages (RHEL)
  ansible.builtin.dnf:
    name:
      - curl
      - gnupg2
      - python3-pip
      - python3-setuptools
      - jq
      - htop
      - unzip
      - firewalld
      - fail2ban
      - logrotate
      - cronie
    state: present
  when: ansible_os_family == 'RedHat'

# ── Docker Installation ──────────────────────────────────────────────────────
- name: Check if Docker is installed
  ansible.builtin.command: docker --version
  register: docker_check
  changed_when: false
  failed_when: false

- name: Install Docker (Debian/Ubuntu)
  when:
    - docker_check.rc != 0
    - ansible_os_family == 'Debian'
    - deploy_mode in ['docker', 'airgapped']
  block:
    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/{{ ansible_distribution | lower }} {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - docker-buildx-plugin
        state: present
        update_cache: true

- name: Install Docker (RHEL)
  when:
    - docker_check.rc != 0
    - ansible_os_family == 'RedHat'
    - deploy_mode in ['docker', 'airgapped']
  block:
    - name: Add Docker repo (RHEL)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'

    - name: Install Docker packages (RHEL)
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - docker-buildx-plugin
        state: present

- name: Start and enable Docker
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  when: deploy_mode in ['docker', 'airgapped']

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER') | default('claude', true)) }}"
    groups: docker
    append: true
  when: deploy_mode in ['docker', 'airgapped']

# ── Docker Daemon Configuration ──────────────────────────────────────────────
- name: Configure Docker daemon
  ansible.builtin.copy:
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "50m",
          "max-file": "5"
        },
        "storage-driver": "overlay2",
        "live-restore": true,
        "default-address-pools": [
          { "base": "172.20.0.0/16", "size": 24 }
        ],
        "metrics-addr": "127.0.0.1:9323",
        "experimental": true
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
  notify: Restart Docker
  when: deploy_mode in ['docker', 'airgapped']

# ── Kubernetes Tools (if K8s mode) ───────────────────────────────────────────
- name: Install kubectl
  when: deploy_mode == 'kubernetes'
  block:
    - name: Download kubectl
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Install Helm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

# ── System Tuning ────────────────────────────────────────────────────────────
- name: Configure kernel parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { key: 'vm.max_map_count', value: '262144' }          # Meilisearch/Elasticsearch
    - { key: 'vm.overcommit_memory', value: '1' }            # Redis
    - { key: 'net.core.somaxconn', value: '65535' }          # Connection backlog
    - { key: 'net.ipv4.tcp_max_syn_backlog', value: '65535' }
    - { key: 'net.ipv4.ip_local_port_range', value: '1024 65535' }
    - { key: 'net.ipv4.tcp_tw_reuse', value: '1' }
    - { key: 'fs.file-max', value: '1048576' }               # Max open files
    - { key: 'net.core.netdev_max_backlog', value: '16384' }

- name: Set ulimits for Docker
  ansible.builtin.copy:
    content: |
      * soft nofile 1048576
      * hard nofile 1048576
      * soft nproc 65535
      * hard nproc 65535
    dest: /etc/security/limits.d/99-eurion.conf
    mode: '0644'

# ── Firewall (UFW for Debian, firewalld for RHEL) ────────────────────────────
- name: Configure UFW firewall
  when: ansible_os_family == 'Debian'
  block:
    - name: Set UFW default deny incoming
      community.general.ufw:
        direction: incoming
        default: deny

    - name: Set UFW default allow outgoing
      community.general.ufw:
        direction: outgoing
        default: allow

    - name: Allow SSH
      community.general.ufw:
        rule: allow
        port: "{{ ansible_port | default(22) }}"
        proto: tcp

    - name: Allow HTTP
      community.general.ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Allow HTTPS
      community.general.ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Allow TURN TCP
      community.general.ufw:
        rule: allow
        port: '3478'
        proto: tcp
      when: feature_video | default(true) | bool

    - name: Allow TURN UDP
      community.general.ufw:
        rule: allow
        port: '3478'
        proto: udp
      when: feature_video | default(true) | bool

    - name: Allow TURNS
      community.general.ufw:
        rule: allow
        port: '5349'
        proto: tcp
      when: feature_video | default(true) | bool

    - name: Allow WebRTC media relay
      community.general.ufw:
        rule: allow
        port: '49152:65535'
        proto: udp
      when: feature_video | default(true) | bool

    - name: Enable UFW
      community.general.ufw:
        state: enabled

- name: Configure firewalld
  when: ansible_os_family == 'RedHat'
  block:
    - name: Start firewalld
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Open required ports (firewalld)
      ansible.posix.firewalld:
        port: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - "{{ ansible_port | default(22) }}/tcp"
        - "80/tcp"
        - "443/tcp"
        - "3478/tcp"
        - "3478/udp"
        - "5349/tcp"
        - "49152-65535/udp"

# ── Fail2ban ─────────────────────────────────────────────────────────────────
- name: Configure fail2ban
  ansible.builtin.copy:
    content: |
      [DEFAULT]
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port = {{ ansible_port | default(22) }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
    dest: /etc/fail2ban/jail.local
    mode: '0644'
  notify: Restart fail2ban

# ── Create Eurion directories ────────────────────────────────────────────────
- name: Create Eurion directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: root
    group: docker
  loop:
    - "{{ eurion_root }}"
    - "{{ eurion_root }}/config"
    - "{{ eurion_root }}/compose"
    - "{{ eurion_root }}/tls"
    - "{{ eurion_data }}"
    - "{{ eurion_data }}/postgres"
    - "{{ eurion_data }}/redis"
    - "{{ eurion_data }}/kafka"
    - "{{ eurion_data }}/minio"
    - "{{ eurion_data }}/meilisearch"
    - "{{ eurion_data }}/loki"
    - "{{ eurion_data }}/grafana"
    - "{{ eurion_data }}/prometheus"
    - "{{ eurion_logs }}"
    - "{{ eurion_backups }}"
    - "{{ eurion_backups }}/postgres"
    - "{{ eurion_backups }}/config"

- name: Set correct ownership on monitoring data directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    owner: "{{ item.uid }}"
    group: "{{ item.uid }}"
    state: directory
    recurse: true
  loop:
    - { path: "{{ eurion_data }}/grafana",    uid: "472"   }
    - { path: "{{ eurion_data }}/prometheus", uid: "65534" }
    - { path: "{{ eurion_data }}/loki",       uid: "10001" }

# ── NTP / Time Sync ─────────────────────────────────────────────────────────
- name: Ensure chrony/systemd-timesyncd is running
  ansible.builtin.systemd:
    name: "{{ 'chrony' if ansible_os_family == 'RedHat' else 'systemd-timesyncd' }}"
    state: started
    enabled: true
  failed_when: false

# ── Handlers ─────────────────────────────────────────────────────────────────
