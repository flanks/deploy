[databases]
;; Wildcard: any database name routes to the same PostgreSQL server
* = host=eurion-postgres port=5432 auth_user=eurion

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 5432
unix_socket_dir =

;; Auth: use scram-sha-256 pass-through with auth_query
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_user = eurion
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

;; Pool settings
pool_mode = transaction
max_client_conn = 500
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 50

;; Startup parameters to ignore (sent by pg clients but irrelevant for pooling)
ignore_startup_parameters = extra_float_digits,search_path

;; Logging
log_connections = 0
log_disconnections = 0
stats_period = 60
admin_users = eurion

;; Timeouts
server_lifetime = 3600
server_idle_timeout = 600
query_wait_timeout = 120
