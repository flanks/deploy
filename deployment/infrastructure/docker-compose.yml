networks:
  eurion-net:
    external: true
    name: eurion-net

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:

services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eurion-postgres
    restart: always
    environment:
      POSTGRES_USER: eurion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - eurion-net
    shm_size: 512mb
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2.0"
        reservations:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eurion"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=1GB
      -c effective_cache_size=3GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=32MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c default_statistics_target=100
      -c log_min_duration_statement=500
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=30000

  # ─── PgBouncer — Connection pooling for all services ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: eurion-pgbouncer
    restart: always
    environment:
      DB_HOST: eurion-postgres
      DB_PORT: "5432"
      DB_USER: eurion
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: "*"
      AUTH_TYPE: scram-sha-256
      AUTH_USER: eurion
      AUTH_QUERY: "SELECT usename, passwd FROM pg_shadow WHERE usename=$$1"
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      MAX_CLIENT_CONN: 500
      MAX_DB_CONNECTIONS: 50
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      QUERY_WAIT_TIMEOUT: 120
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
      STATS_PERIOD: 60
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,search_path
      ADMIN_USERS: eurion
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U eurion || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eurion-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-backlog 511
      --hz 10
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper ───────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: eurion-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: eurion-kafka
    restart: always
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://127.0.0.1:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_MESSAGE_MAX_BYTES: "2097152"
      KAFKA_REPLICA_FETCH_MAX_BYTES: "2097152"
    volumes:
      - kafka_data:/var/lib/kafka/data
    ports:
      - "127.0.0.1:9094:9094"
    networks:
      eurion-net:
        aliases:
          - kafka
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
