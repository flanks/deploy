networks:
  eurion-net:
    external: true
    name: eurion-net

volumes:
  minio_data:
  meilisearch_data:

services:

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: eurion-minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - eurion-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── MinIO bucket init (runs once then exits) ─────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: eurion-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - eurion-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/eurion-files &&
        mc mb --ignore-existing local/eurion-avatars &&
        mc mb --ignore-existing local/eurion-recordings &&
        mc mb --ignore-existing local/eurion-backups &&
        mc anonymous set download local/eurion-avatars &&
        echo 'Buckets ready'
      "

  # ─── Meilisearch (full-text search) ──────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: eurion-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    networks:
      - eurion-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
