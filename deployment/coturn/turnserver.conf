# EURION Coturn - TURN/STUN Server Configuration
# Replace YOUR_PUBLIC_IP and YOUR_VM_IP before deploying.

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=YOUR_VM_IP
external-ip=YOUR_PUBLIC_IP/YOUR_VM_IP
relay-ip=YOUR_VM_IP

# Relay port range (must match firewall / port forwarding rules)
min-port=49152
max-port=65535

# Authentication (long-term credential mechanism)
lt-cred-mech
fingerprint
realm=YOUR_DOMAIN
server-name=turn.YOUR_DOMAIN

# Credentials — used by video-service ICE config
# Set via environment or replace at deploy time:
user=eurion:YOUR_TURN_PASSWORD

# Security: block private/loopback ranges (SSRF prevention)
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=224.0.0.0-255.255.255.255
# Allow relay back to VM itself (for internal media processing)
allowed-peer-ip=YOUR_VM_IP

no-multicast-peers

# Logging
log-file=/var/lib/coturn/coturn.log
simple-log
no-stdout-log

# Misc
stale-nonce=600
mobility
no-cli
