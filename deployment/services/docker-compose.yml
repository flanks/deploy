      DATABASE_URL: postgresql://eurion:${POSTGRES_PASSWORD}@eurion-pgbouncer:5432/eurion_transcription
      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: transcription-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
      CORS_ORIGINS: https://eurion.se,https://app.eurion.se,http://tauri.localhost,https://tauri.localhost
      RATE_LIMIT_MAX: "200"
      RATE_LIMIT_WINDOW_MS: "60000"
      WHISPER_ENDPOINT: http://eurion-whisper:9000
      AI_SERVICE_URL: http://eurion-ai-service:3010
    networks:
      - eurion-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3013/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
