      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: search-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
