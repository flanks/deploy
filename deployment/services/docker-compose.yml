      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW_MS: "60000"
      MEILISEARCH_URL: http://eurion-meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      DB_POOL_MAX: "5"
      DB_POOL_MIN: "1"
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: "0.5"
    healthcheck:
