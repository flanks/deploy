    image: eurion/ai-service:latest
    container_name: eurion-ai-service
    restart: always
    environment:
      NODE_ENV: production
      SERVICE_NAME: eurion-ai-service
      SERVICE_PORT: "3010"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://eurion:${POSTGRES_PASSWORD}@eurion-pgbouncer:5432/eurion_ai
      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: ai-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
      CORS_ORIGINS: https://eurion.se,https://app.eurion.se,http://tauri.localhost,https://tauri.localhost
      RATE_LIMIT_MAX: "30"
      RATE_LIMIT_WINDOW_MS: "60000"
      OLLAMA_HOST: http://eurion-ollama:11434
      DB_POOL_MAX: "5"
      DB_POOL_MIN: "1"
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    healthcheck:
