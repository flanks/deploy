  # --- Bridge Service (:3014) � M365/Teams Interop -----------------------
  bridge-service:
    image: eurion/bridge-service:latest
    container_name: eurion-bridge-service
    restart: always
    environment:
      NODE_ENV: production
      SERVICE_NAME: eurion-bridge-service
      SERVICE_PORT: "3014"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://eurion:${POSTGRES_PASSWORD}@eurion-pgbouncer:5432/eurion_bridge
      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: bridge-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
      CORS_ORIGINS: https://eurion.se,https://app.eurion.se,http://tauri.localhost,https://tauri.localhost
      RATE_LIMIT_MAX: "200"
      RATE_LIMIT_WINDOW_MS: "60000"
      BRIDGE_TOKEN_ENC_KEY: ${BRIDGE_TOKEN_ENC_KEY}
      BRIDGE_INTERNAL_SECRET: ${BRIDGE_INTERNAL_SECRET}
      SMTP_HOST: ${SMTP_HOST:-smtp.eu.mailgun.org}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM:-Eurion <no-reply@mail.eurion.se>}
      WEB_APP_URL: https://eurion.se
      WEBHOOK_BASE_URL: https://api.eurion.se
      GATEWAY_URL: http://eurion-gateway:3000
      INTERNAL_DOMAINS: eurion.se,eurion.eu
    networks:
      - eurion-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3014/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Ollama (Local LLM for ai-service) -----------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: eurion-ollama
    restart: always
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 12g
          cpus: "8.0"
        reservations:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "ollama ls > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- Gotenberg (PDF/Office conversion for preview-service) --------------
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: eurion-gotenberg
    restart: always
    command:
      - "gotenberg"
      - "--libreoffice-auto-start=true"
      - "--libreoffice-restart-after=10"
      - "--api-timeout=60s"
    networks:
      - eurion-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  ollama_data:
