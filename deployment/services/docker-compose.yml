      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      PREVIEW_BUCKET: eurion-files
      GOTENBERG_URL: http://eurion-gotenberg:3000
