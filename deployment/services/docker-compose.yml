networks:
  eurion-net:
    external: true
    name: eurion-net

services:

  # --- API Gateway (:3000) ------------------------------------------------
  gateway:
    image: eurion/gateway:latest
    container_name: eurion-gateway
    restart: always
    environment:
      NODE_ENV: production
      SERVICE_NAME: eurion-gateway
      SERVICE_PORT: "3000"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://eurion:${POSTGRES_PASSWORD}@eurion-postgres:5432/postgres
      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: gateway
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: https://eurion.se,https://app.eurion.se,http://tauri.localhost,https://tauri.localhost
      RATE_LIMIT_MAX: "200"
      RATE_LIMIT_WINDOW_MS: "60000"
      ENABLE_SWAGGER: "false"
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.eurion.se`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=le"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  # --- Identity Service (:3001) -------------------------------------------
  identity-service:
    image: eurion/identity-service:latest
    container_name: eurion-identity-service
    restart: always
    environment:
      NODE_ENV: production
      SERVICE_NAME: eurion-identity-service
      SERVICE_PORT: "3001"
      LOG_LEVEL: info
      DATABASE_URL: postgresql://eurion:${POSTGRES_PASSWORD}@eurion-pgbouncer:5432/eurion_identity
      REDIS_URL: redis://:${REDIS_PASSWORD}@eurion-redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_CLIENT_ID: identity-service
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: EURION
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGINS: https://eurion.se,https://app.eurion.se,http://tauri.localhost,https://tauri.localhost
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_WINDOW_MS: "60000"
      DB_POOL_MAX: "15"
      DB_POOL_MIN: "3"
      SMTP_HOST: smtp.eu.mailgun.org
      SMTP_PORT: "587"
      SMTP_USER: postmaster@eurion.se
      SMTP_PASS: ${MAILGUN_SMTP_PASS}
      SMTP_FROM: "Eurion Calendar <postmaster@eurion.se>"
      WEB_APP_URL: https://app.eurion.se
      API_BASE_URL: https://app.eurion.se/api
      REGISTRATION_OPEN: "false"
      REGISTRATION_ALLOWED_DOMAINS: eurion.se
    networks:
      - eurion-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
        reservations:
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # --- Org Service (:3002) ------------------------------------------------
